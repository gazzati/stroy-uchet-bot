name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE_TAG="sha-${{ github.event.workflow_run.head_sha }}"
          IMAGE_TAG="${IMAGE_TAG:0:16}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "tags=gazzati/stroy-uchet-bot:$IMAGE_TAG,gazzati/stroy-uchet-bot:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/stroy-uchet-bot
            if [ ! -f .env ]; then
              echo "Missing required file: .env"
              exit 1
            fi
            if [ ! -f docker-compose.yml ]; then
              echo "Missing required file: docker-compose.yml"
              exit 1
            fi
            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" > .env.deploy
            mkdir -p logs/archive
            TS=$(date +%F_%H-%M-%S)
            CID=$(docker compose --env-file .env --env-file .env.deploy ps -q stroy-uchet-bot)
            if [ -n "$CID" ]; then
              docker logs --timestamps "$CID" > "logs/archive/stroy-uchet-bot_${TS}.log" 2>&1 || true
            fi
            docker compose --env-file .env --env-file .env.deploy pull stroy-uchet-bot
            docker compose --env-file .env --env-file .env.deploy up -d stroy-uchet-bot postgres

